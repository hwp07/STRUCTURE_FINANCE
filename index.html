<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Structure Finance</title>
    <link rel="stylesheet" href="./css/index.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <div class="header-box">
          <div class="header-title">
            <p>📒 Tài Chính Cá Nhân</p>
          </div>

          <div class="header-option">
            <p>Tài khoản</p>
            <div class="icon">
              <img src="./assets/images/Vector.png" alt="" />
            </div>
          </div>
        </div>
      </header>

      <div class="taskbar">
        <div class="taskbar-items">
          <img src="./assets/images/Vector (1).png" alt="" />
          <a href="./index.html">Information</a>
        </div>

        <div class="taskbar-items">
          <img src="./assets/images/Vector (2).png" alt="" />
          <a href="">Category</a>
        </div>

        <div class="taskbar-items">
          <img src="./assets/images/Vector (3).png" alt="" />
          <a href="">History</a>
        </div>
      </div>

      <section class="banner">
        <h2 class="banner-title">🎯 Kiểm soát chi tiêu thông minh</h2>
        <p class="banner-text">
          Theo dõi ngân sách và thu chi hằng tháng dễ dàng
        </p>
      </section>

      <main class="main">
        <div class="main-content">
          <p class="main-title">📊 Quản Lý Tài Chính Cá Nhân</p>

          <div class="money-left">
            <p class="money-left-label">Số tiền còn lại</p>
            <p class="money-left-value">0 VND</p>
          </div>

          <div class="input-box month-box">
            <label>📅 Chọn tháng:</label>
            <input type="month" />
          </div>

          <div class="input-box budget-box">
            <label>💰 Ngân sách tháng:</label>
            <input type="number" placeholder="VD: 5000000" />
            <button class="button-save">Lưu</button>
          </div>

          <p class="extra-title">Quản Lý Thông tin cá nhân</p>
          <div class="infor-user">
            <form class="form">
              <div class="form-row">
                <div class="form-group">
                  <label>Name <span>*</span></label>
                  <input type="text" placeholder="Nguyen Van A" />
                </div>

                <div class="form-group">
                  <label>Email <span>*</span></label>
                  <input type="email" placeholder="nguyenvana@gmail.com" />
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label>Phone <span>*</span></label>
                  <input type="text" placeholder="0987654321" />
                </div>

                <div class="form-group">
                  <label>Gender <span>*</span></label>
                  <input type="text" placeholder="Male" />
                </div>
              </div>

              <div class="form-actions">
                <button class="btn outline">Change Information</button>
                <button class="btn outline">Change Password</button>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Structure Finance</title>
    <style>
      html.preload body {
        opacity: 0;
        visibility: hidden;
      }

      html.page-ready body {
        opacity: 1;
        visibility: visible;
        transition: opacity 0.15s ease;
      }
    </style>
    <script>
      (function () {
        const root = document.documentElement;
        root.classList.add("preload");

        const currentUserId = localStorage.getItem("currentUserId");

        if (!currentUserId) {
          window.location.replace("./pages/login.html");
          return;
        }

        root.classList.remove("preload");
        root.classList.add("page-ready");
      })();
    </script>
    <link rel="stylesheet" href="./css/index.css" />
  </head>
  <body>
    <div class="page" id="page">
      <header class="header" id="header">
        <div class="header-box">
          <div class="header-title">
            <p>📒 Tài Chính Cá Nhân</p>
          </div>

          <div class="header-option">
            <div class="option">
              <select id="select-account" onchange="handleOption()">
                <option value="">Tài khoản</option>
                <option value="logout">Đăng xuất</option>
              </select>
            </div>
          </div>
        </div>
      </header>

      <!-- LOGOUT -->
      <div class="logout-overlay" id="logout-overlay">
        <div class="logout">
          <p class="logout-title">Bạn có chắc chắn muốn đăng xuất không?</p>

          <div class="logout-confirm">
            <button class="confirm-btn" id="btn-confirm-logout">Có</button>
            <button class="confirm-btn" id="btn-cancel-logout">Không</button>
          </div>
        </div>
      </div>

      <!-- TASKBAR -->
      <div class="taskbar" id="taskbar">
        <div class="taskbar-items active">
          <img src="./assets/images/Vector (1).png" alt="" />
          <a href="./index.html">Information</a>
        </div>

        <div class="taskbar-items">
          <img src="./assets/images/Vector (2).png" alt="" />
          <a href="./pages/category.html">Category</a>
        </div>

        <div class="taskbar-items">
          <img src="./assets/images/Vector (3).png" alt="" />
          <a href="./pages/history.html">History</a>
        </div>
      </div>

      <!-- BANNER -->
      <section class="banner" id="banner">
        <h2 class="banner-title">🎯 Kiểm soát chi tiêu thông minh</h2>
        <p class="banner-text">
          Theo dõi ngân sách và thu chi hằng tháng dễ dàng
        </p>
      </section>

      <!-- MAIN -->
      <main class="main" id="main">
        <div class="main-content">
          <p class="main-title">📊 Quản Lý Tài Chính Cá Nhân</p>

          <!-- MONEY LEFT -->
          <div class="money-left" id="money-left">
            <p class="money-left-label">Số tiền còn lại</p>
            <p class="money-left-value" id="text-money-left">0 VND</p>
          </div>

          <!-- MONTH -->
          <div class="input-box month-box">
            <label>📅 Chọn tháng:</label>
            <input type="month" id="input-month" />
            <p class="err-month" id="err-month">Vui lòng chọn tháng!</p>
          </div>

          <!-- BUDGET -->
          <div class="input-box budget-box">
            <label>💰 Ngân sách tháng:</label>
            <input type="number" id="input-budget" placeholder="VD: 5000000" />
            <button class="button-save" id="btn-save-budget">Lưu</button>
            <p class="err-budget" id="err-budget">Vui lòng nhập số tiền!</p>
          </div>

          <!-- USER INFO -->
          <p class="extra-title">Quản Lý Thông tin cá nhân</p>

          <div class="infor-user">
            <form class="form" id="form-user">
              <div class="form-row">
                <div class="form-group">
                  <label>Name <span>*</span></label>
                  <input
                    type="text"
                    id="input-name"
                    placeholder="Nguyen Van A"
                  />
                </div>

                <div class="form-group">
                  <label>Email <span>*</span></label>
                  <input
                    type="email"
                    id="input-email"
                    placeholder="nguyenvana@gmail.com"
                  />
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label>Phone <span>*</span></label>
                  <input
                    type="text"
                    id="input-phone"
                    placeholder="0987654321"
                  />
                </div>

                <div class="form-group">
                  <label>Gender <span>*</span></label>
                  <input type="text" id="input-gender" placeholder="Male" />
                </div>
              </div>

              <div class="form-actions">
                <button class="btn outline" id="btn-change-info">
                  Change Information
                </button>
                <button class="btn outline" id="btn-change-password">
                  Change Password
                </button>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>

    <script src="./js/index.js"></script>
  </body>
</html>

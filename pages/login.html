<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="../css/login.css" />
  </head>
  <body>
    <div class="background">
      <div class="container">
        <div class="login">
          <div class="title">
            <p>🔐 Sign In</p>
            <p class="successfully" id="success-msg">Sign In Successfully</p>
          </div>

          <form id="login-form">
            <div class="input">
              <div class="form-group" id="email-group">
                <input type="email" id="email" placeholder="Email here..." />
                <p class="err" id="email-err">Please enter your email...</p>
              </div>

              <div class="form-group" id="password-group">
                <input
                  type="password"
                  id="password"
                  placeholder="Password here..."
                />
                <p class="err" id="password-err">
                  Please enter your password...
                </p>
              </div>

              <button
                class="login-btn"
                id="login-btn"
                type="submit"
                onclick="handle(event)"
              >
                Sign In
              </button>
            </div>
          </form>

          <div class="link">
            <p>You don't have account?</p>
            <a href="register.html" id="signup-link">Sign Up Now</a>
          </div>
        </div>
      </div>
    </div>

    <script src="../js/login.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <style>
      html.preload body {
        opacity: 0;
        visibility: hidden;
      }

      html.page-ready body {
        opacity: 1;
        visibility: visible;
        transition: opacity 0.15s ease;
      }
    </style>
    <script>
      (function () {
        document.documentElement.classList.add("preload");
        const currentUser = JSON.parse(sessionStorage.getItem("currentUser"));

        if (currentUser) {
          window.location.replace("../index.html");
        }
      })();
    </script>
    <link rel="stylesheet" href="../css/login.css" />
  </head>
  <body>
    <div class="background">
      <div class="container">
        <div class="login">
          <div class="title">
            <img src="../assets/images/Heading 2 → 🔐 Đăng nhập.svg" alt="" />
            <p class="successfully" id="success-msg">Sign In Successfully</p>
          </div>

          <form id="login-form">
            <div class="input">
              <div class="form-group" id="email-group">
                <input type="email" id="email" placeholder="Email here..." />
              </div>

              <div class="form-group" id="password-group">
                <input
                  type="password"
                  id="password"
                  placeholder="Password here..."
                />
              </div>

              <p class="err form-error" id="login-err">
                Please enter your email and password...
              </p>

              <button class="login-btn" id="login-btn" type="submit">
                Sign In
              </button>
            </div>
          </form>

          <div class="link">
            <p>You don't have account?</p>
            <a href="register.html" id="signup-link">Sign Up Now</a>
          </div>
        </div>
      </div>
    </div>

    <script src="../js/login.js"></script>
  </body>
</html>

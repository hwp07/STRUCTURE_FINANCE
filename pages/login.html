<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="../css/login.css" />
  </head>
  <body>
    <div class="background">
      <div class="container">
        <div class="login">
          <div class="title">
            <p>🔐 Sign In</p>
            <p class="successfully">Sign In Successfully</p>
          </div>

          <form>
            <div class="input">
              <div class="form-group">
                <input type="email" placeholder="Email here..." />
                <p class="err">Please enter your email...</p>
              </div>

              <div class="form-group">
                <input type="password" placeholder="Password here..." />
                <p class="err">Please enter your password...</p>
              </div>

              <a class="login-btn" href="register.html">Sign In</a>
            </div>
          </form>

          <div class="link">
            <p>You don't have account?</p>
            <a href="register.html">Sign Up Now</a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

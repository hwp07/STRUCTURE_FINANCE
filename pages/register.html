<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <style>
      html.preload body {
        opacity: 0;
        visibility: hidden;
      }

      html.page-ready body {
        opacity: 1;
        visibility: visible;
        transition: opacity 0.15s ease;
      }
    </style>
    <script>
      (function () {
        document.documentElement.classList.add("preload");
        const currentUserId = localStorage.getItem("currentUserId");

        if (currentUserId) {
          window.location.replace("../index.html");
        }
      })();
    </script>
    <link rel="stylesheet" href="../css/register.css" />
  </head>
  <body>
    <div class="background" id="background">
      <div class="container" id="container">
        <div class="register" id="register">
          <div class="title" id="title">
            <p>Sign Up</p>
            <p class="successfully" id="success-message">
              Sign Up Successfully
            </p>
          </div>

          <form id="register-form">
            <div class="input" id="input-group">
              <div class="form-group" id="email-group">
                <input id="email" type="email" placeholder="Email here..." />
                <p class="err" id="email-error">Please enter your email...</p>
              </div>

              <div class="form-group" id="password-group">
                <input
                  id="password"
                  type="password"
                  placeholder="Password here..."
                />
                <p class="err" id="password-error">
                  Please enter your password...
                </p>
              </div>

              <div class="form-group" id="confirm-password-group">
                <input
                  id="confirm-password"
                  type="password"
                  placeholder="Confirm password here..."
                />
                <p class="err" id="confirm-password-error">
                  Please enter your confirm password...
                </p>
              </div>

              <button
                type="submit"
                class="register-btn"
                id="register-btn"
                onclick="handle(event)"
              >
                Sign Up
              </button>
            </div>
          </form>

          <div class="link" id="login-link">
            <p>You have account?</p>
            <a id="signin-link" href="login.html">Sign in</a>
          </div>
        </div>
      </div>
    </div>

    <script src="../js/register.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="../css/register.css" />
  </head>
  <body>
    <div class="background">
      <div class="container">
        <div class="register">
          <div class="title">
            <p>Sign Up</p>
            <p class="successfully">Sign Up Successfully</p>
          </div>

          <form>
            <div class="input">
              <div class="form-group">
                <input type="email" placeholder="Email here..." />
                <p class="err">Please enter your email...</p>
              </div>

              <div class="form-group">
                <input type="password" placeholder="Password here..." />
                <p class="err">Please enter your password...</p>
              </div>

              <div class="form-group">
                <input type="password" placeholder="Confirm password here..." />
                <p class="err">Please enter your confirm password...</p>
              </div>
              <a class="register-btn" href="login.html">Sign Up</a>
            </div>
          </form>

          <div class="link">
            <p>You have account?</p>
            <a href="login.html">Sign in</a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
